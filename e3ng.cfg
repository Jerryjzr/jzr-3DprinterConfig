#   定义 Y 轴校准的最小 Y 坐标。
#   该坐标应使喷嘴位于 Y 轴校准的起始位置。
#   如果要补偿 Y 轴扭曲，则必须提供此参数。
calibrate_end_y: 230
#   定义 Y 轴校准的最大 Y 坐标。
#   该坐标应使喷嘴位于 Y 轴校准的结束位置。
#   如果要补偿 Y 轴扭曲，则必须提供此参数。
calibrate_x: 117.5
#   定义 Y 轴扭曲补偿校准的 X 坐标。
#   在校准过程中，该坐标应使喷嘴位于此 X 轴位置。
