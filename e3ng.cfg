#   在校准过程中，非探测移动的速度（单位：毫米/秒）。
#   默认值为 50。
horizontal_move_z: 5
#   在开始探测操作之前，喷嘴需要移动到的位置高度（单位：毫米）。
#   默认值为 5。
calibrate_start_x: 5
#   定义校准的最小 X 坐标。
#   该坐标应使喷嘴位于校准的起始位置。
calibrate_end_x: 230
#   定义校准的最大 X 坐标。
#   该坐标应使喷嘴位于校准的结束位置。
calibrate_y: 117.5
#   定义校准的 Y 坐标。
#   在校准过程中，该坐标应使喷嘴位于此 Y 轴位置。
#   建议将此参数设置在热床中心附近。

# 如需进行 Y 轴扭曲补偿，请指定以下参数：
