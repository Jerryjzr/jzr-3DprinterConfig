
[include timelapse.cfg]
[include mainsail.cfg ]
[include macro.cfg ]
#[include SHT36V3.cfg]

[force_move]
enable_force_move: true

[gcode_macro _LDC_CALIBRATE_DRIVE_CURRENT]
gcode:
    BED_MESH_CLEAR
    SET_KINEMATIC_POSITION x=100 y=100 z=10
    G28 X Y
    M104 S0
    M140 S0
    M106 S0
    G0 X{printer.toolhead.axis_maximum.x / 2} Y{printer.toolhead.axis_maximum.y / 2} F6000
    G0 Z30 F600
    G4 P1000
    LDC_CALIBRATE_DRIVE_CURRENT CHIP=fly_eddy_probe 
    G4 P1000
    SAVE_CONFIG

[gcode_macro PROBE_EDDY_CURRENT_CALIBRATE_AUTO]
gcode:
    BED_MESH_CLEAR
    G28 X Y
    M104 S0
    M140 S0
    M106 S0
    G90 # Abs positioning
    G1 X{ printer.toolhead.axis_maximum.x/2 } Y{ printer.toolhead.axis_maximum.y/2 } F6000
    {% if 'z' not in printer.toolhead.homed_axes %}
        SET_KINEMATIC_POSITION Z={ printer.toolhead.axis_maximum.z-1 } # Allows the user to work it down until it touches.
    {% endif %}
    PROBE_EDDY_CURRENT_CALIBRATE {rawparams}
 

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: _BED_MESH_CALIBRATE
gcode:
    {% set PROBE_Z_OFFSET = printer.configfile.settings['probe_eddy_current fly_eddy_probe'].z_offset|float %}
    _BED_MESH_CALIBRATE horizontal_move_z={PROBE_Z_OFFSET} METHOD=rapid_scan {rawparams}


    
#[mcu]
#canbus_uuid:02fd636064f5

[virtual_sdcard]
path: /home/jzr/printer_data/gcodes

[mcu]                     
#serial: /dev/ttyACM0 #/dev/serial/by-id/usb-Klipper_stm32f072xb_1F0029001253555533323620-if00
canbus_uuid:02fd636064f5

[temperature_sensor Fly-D5]       # FLY主板温度
sensor_type: temperature_mcu      # 关联mcu（默认）

[printer]                       # 打印机设置
kinematics: corexy               # 运动学结构分为:笛卡尔和corexy等等。笛卡尔:cartesian
max_velocity: 300               # 打印机最大速度   
max_accel: 3000                 # 最大加速度 最大3000
max_z_velocity: 15              # z轴最大速度
max_z_accel: 100                # z轴最大加速度
square_corner_velocity: 5.0     # 方形拐角速度,小一点可以有效避免平台重带来的惯性


[stepper_x]
step_pin: PC15                       # X轴电机脉冲引脚设置
dir_pin: !PC14                        # X轴电机运行引脚设置,方向按实际判断,加感叹号会让运行方向反转
enable_pin: !PC2                   # X轴电机使能引脚设置,使能引脚需要加感叹号,否者电机不工作
rotation_distance: 40               # 主动带轮周长mm(2GT-20T带轮40,2GT-16T带轮32)
microsteps: 16                      # 电机细分设置,细分越高,质量越高,但主控负荷越大
full_steps_per_rotation: 200        # 电机单圈所需脉冲数(1.8度电机:200,0.9度电机:400)
endstop_pin: SHT36:gpio16                  # 限位开关PIN脚,建议常闭接常闭
#endstop_pin: tmc5160_stepper_x:virtual_endstop        # 无限位归零配置
###接常闭后是触发状态,加感叹号可以反转这个状态,万一断线时候可以避免撞机
position_endstop: 0
position_max: 232
homing_speed: 75
second_homing_speed: 25

[tmc2208 stepper_x]
uart_pin: PC13
interpolate: True                  # 是否开启256微步插值(开启是True,关闭是False)
run_current: 0.65                    # 运行电流
sense_resistor: 0.110               # 驱动采样电阻不要改
stealthchop_threshold: 0

[stepper_y]
step_pin: PA1
dir_pin: !PA0
enable_pin: !PA2
rotation_distance: 40
microsteps: 16                       # 电机细分设置,细分越高,质量越高,但主控负荷越大
full_steps_per_rotation: 200         # 电机单圈所需脉冲数(1.8度电机:200,0.9度电机:400)
endstop_pin: PB3                   # 限位开关PIN脚,建议常闭然后添加!反转状态
#endstop_pin: tmc5160_stepper_x:virtual_endstop        # 无限位归零配置
###接常闭后是触发状态,加感叹号可以反转这个状态,万一断线时候可以避免撞机
position_endstop: 248
position_max: 248
homing_speed: 75
second_homing_speed: 25

[tmc2208 stepper_y]
uart_pin: PC3
interpolate: True                  # 是否开启256微步插值(开启是True,关闭是False)
run_current: 0.65                    # 运行电流
sense_resistor: 0.110               # 驱动采样电阻不要改
stealthchop_threshold: 0

[stepper_z]
step_pin: PA5
dir_pin: PA4
enable_pin: !PA6
rotation_distance: 4         # 丝杆导程为 8,请根据你的实际使用情况修改
microsteps: 16
full_steps_per_rotation: 200  # 电机单圈所需脉冲数(1.8度电机:200,0.9度电机:400)
#endstop_pin: ^PD2             # 限位开关接口
endstop_pin: probe:z_virtual_endstop
position_max: 290             # 软限位最大行程 (240mm-290mm-340mm)
position_min: -5              # 软限位最小行程(配置喷嘴清洁需要-5左右)
homing_speed: 10              # 复位速度-最大 20
second_homing_speed: 3        # 二次复位速度-最大 10
homing_retract_dist: 3        # 后撤距离

[tmc2208 stepper_z]
uart_pin: PA3 # 连接到 TMC2208 芯片 PDN_UART 线的引脚。此参数必须提供。
interpolate: True # 如果设置为 True，则启用 256 微步插值。False 表示禁用插值功能，可以减少延迟但可能增加噪音。默认值为 True。
run_current: 0.32 # 步进电机运动时使用的电流值，单位：安培 RMS。此处设置为 0.8A。
sense_resistor: 0.110 # 电机采样电阻的阻值，单位：欧姆。0.110 欧姆为标准值，通常不需要修改。
stealthchop_threshold: 20
#hold_current: 0.5 # 步进电机静止时使用的电流值，单位：安培 RMS。不建议设置保持电流，默认不会降低电流。
#stealthchop_threshold: 0 # 设置静音模式的速度阈值，单位：毫米/秒。当速度低于此值时启用 stealthChop 静音模式。0 表示禁用 stealthChop 模式，默认值为 0。
#tx_pin: # 如果使用独立的发送线路，请在此设置发送引脚。默认与 uart_pin 共用。
#select_pins: # 访问 UART 前需要设置的引脚列表，用逗号分隔。用于配置模拟多路复用器。
#driver_MULTISTEP_FILT: True # 多步滤波，True 为启用。
#driver_IHOLDDELAY: 8 # 保持电流延迟时间，范围 0-15。
#driver_TPOWERDOWN: 20 # 功率关闭延迟，范围 0-255。
#driver_TBL: 2 # 空白时间，范围 0-3。
#driver_TOFF: 3 # 关闭时间，范围 1-15。
#driver_HEND: 0 # 衰减模式结束时间，范围 0-15。
#driver_HSTRT: 5 # 衰减模式开始时间，范围 0-15。
#driver_PWM_AUTOGRAD: True # PWM 自动梯度，True 为启用。
#driver_PWM_AUTOSCALE: True # PWM 自动缩放，True 为启用。
#driver_PWM_LIM: 12 # PWM 限制，范围 0-255。
#driver_PWM_REG: 8 # PWM 调节，范围 0-255。
#driver_PWM_FREQ: 1 # PWM 频率选择：1=2/1024，2=2/683，3=2/512。
#driver_PWM_GRAD: 14 # PWM 梯度，范围 0-255。
#driver_PWM_OFS: 36 # PWM 偏移，范围 0-255。
#driver_FREEWHEEL: 0 # 空闲模式：0=正常，1=自由旋转，2=线圈短路，3=制动。

[probe_eddy_current fly_eddy_probe]
sensor_type: ldc1612
i2c_address: 43
i2c_mcu: SHT36
i2c_bus: i2c1e
x_offset: 0
y_offset: 42
z_offset: 2
i2c_speed: 4000000

[temperature_probe fly_eddy_probe]
sensor_type: Generic 3950
sensor_pin:SHT36:gpio28
horizontal_move_z: 2.5

